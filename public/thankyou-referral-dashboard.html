<style>
:root {
  --bg: #f5f7f4;
  --card: #ffffff;
  --fg: #0e0e0e;
  --muted: #4b4b4b;
  --line: #e4e8e3;
  --accent: #0e5732;
  --accent-2: #174a32;
  --gold: #ccb784;
  --sand: #e8e2d2;
  --soft: #eef4ee;
  --error: #8a1f1f;
  --shadow: 0 18px 50px rgba(14,87,50,.06);
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
html, body { margin: 0; padding: 0; width: 100%; overflow-x: hidden; }
body {
  font-family: "Inter", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
  color: var(--fg);
  background: var(--bg);
  line-height: 1.55;
  letter-spacing: .012em;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; }
img { max-width: 100%; display: block; }
button, input, select, textarea { font: inherit; }
.container { max-width: 1180px; margin: 0 auto; padding: 0 24px; }
.hidden { display: none !important; }

/* top */
.confirm-bar { background: var(--accent); color: #fff; font-weight: 600; }
.confirm-bar .container { display: flex; justify-content: center; align-items: center; gap: 10px; padding-top: 7px; padding-bottom: 7px; font-size: 14px; text-align: center; }
.cb-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold); box-shadow: 0 0 0 4px rgba(204,183,132,.22); }
.top { position: sticky; top: 0; z-index: 50; background: rgba(245,247,244,.92); border-bottom: 1px solid var(--line); backdrop-filter: blur(14px); }
.top-row { min-height: 58px; display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 14px 24px; }
.brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
.logo { height: 26px; width: auto; }
.brand-divider { width: 1px; height: 22px; background: var(--line); }
.brand-title { color: var(--muted); font-size: 13px; font-weight: 700; white-space: nowrap; }
.top-links { display: flex; align-items: center; gap: 10px; }

/* buttons */
.btn, button { border: 0; cursor: pointer; }
.btn, .ghost-btn, .secondary-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 9px;
  border-radius: 999px; font-weight: 800; white-space: nowrap; transition: transform .15s ease, box-shadow .15s ease, background .15s ease, color .15s ease;
}
.btn { background: var(--accent); color: #fff; padding: 14px 22px; box-shadow: 0 6px 16px rgba(14,87,50,.18); }
.btn:hover { background: var(--accent-2); transform: translateY(-1px); box-shadow: 0 12px 24px rgba(14,87,50,.24); }
.ghost-btn, .secondary-btn { background: #fff; color: var(--accent); border: 1.5px solid rgba(14,87,50,.20); padding: 11px 16px; box-shadow: none; }
.ghost-btn { font-size: 13px; padding: 8px 13px; }
.secondary-btn:hover, .ghost-btn:hover { background: var(--accent); color: #fff; }
button:disabled { opacity: .64; cursor: not-allowed; transform: none !important; }
.google-btn { width: 100%; max-width: 420px; margin: 0 auto; background: #fff; color: #1f1f1f; border: 1px solid #dadce0; box-shadow: 0 8px 20px rgba(0,0,0,.05); }
.google-btn:hover { background: #fff; color: #1f1f1f; }
.google-mark { width: 20px; height: 20px; flex: 0 0 auto; }

/* hero */
.hero { padding: 42px 0 22px; }
.hero-card {
  position: relative; overflow: hidden;
  display: grid; grid-template-columns: minmax(0, 1fr) auto; align-items: stretch; gap: 0;
  min-height: 210px; border-radius: 24px; color: #fff;
  background:
    radial-gradient(circle at 18% 12%, rgba(204,183,132,.32), transparent 30%),
    linear-gradient(135deg, #143d2a 0%, #0e5732 48%, #092417 100%);
  box-shadow: 0 22px 56px rgba(14,87,50,.18);
}
.hero-card::before {
  content: ""; position: absolute; inset: 14px; border: 1px solid rgba(255,255,255,.16);
  border-radius: 18px; pointer-events: none;
}
.hero-card::after {
  content: ""; position: absolute; right: -80px; top: -120px; width: 270px; height: 270px;
  border-radius: 50%; background: rgba(204,183,132,.22); pointer-events: none;
}
.hero-copy { position: relative; z-index: 1; padding: clamp(28px, 4.5vw, 46px); align-self: center; }
.eyebrow, .panel-kicker { color: var(--accent); font-size: 12px; letter-spacing: .18em; text-transform: uppercase; font-weight: 800; }
.hero-card .eyebrow {
  display: inline-flex; align-items: center; gap: 8px; margin-bottom: 12px; color: #e9d8a5;
}
.hero-card .eyebrow::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--gold); box-shadow: 0 0 0 4px rgba(204,183,132,.18); }
h1, h2, h3, p { margin: 0; }
h1 { font-size: clamp(34px, 5vw, 58px); line-height: .98; letter-spacing: -.045em; font-weight: 750; }
h2 { font-size: clamp(25px, 3vw, 34px); line-height: 1.08; letter-spacing: -.03em; font-weight: 700; }
h3 { font-size: 18px; line-height: 1.15; letter-spacing: -.01em; font-weight: 750; }
.lead { max-width: 560px; margin-top: 12px; color: rgba(255,255,255,.72); font-size: 16px; font-weight: 500; }
.hero-accent {
  position: relative; z-index: 1; width: min(34vw, 330px); min-width: 260px;
  display: grid; place-items: center; padding: 28px;
  border-left: 2px dotted rgba(255,255,255,.25);
  background: #272e26;
}
.hero-accent::before, .hero-accent::after {
  content: ""; position: absolute; left: -13px; width: 26px; height: 26px; border-radius: 50%; background: var(--bg);
}
.hero-accent::before { top: -13px; }
.hero-accent::after { bottom: -13px; }
.hub-badge {
  width: 100%; border-radius: 20px; padding: 18px;
  background: #272e26; color: #fff;
  box-shadow: 0 20px 46px rgba(0,0,0,.26), inset 0 1px 0 rgba(255,255,255,.08);
}
.hub-label { display: block; color: var(--gold); font-size: 11px; letter-spacing: .2em; text-transform: uppercase; font-weight: 850; }
.hub-title { display: block; margin-top: 6px; font-size: 28px; line-height: 1; letter-spacing: -.04em; font-weight: 850; color: #fff; }
.hub-meta { display: grid; gap: 8px; margin-top: 16px; }
.hub-meta span, .pill {
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 999px; padding: 7px 11px; background: rgba(204,183,132,.18); color: #6e581c;
  font-size: 12px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase;
}
.hub-meta span { color: rgba(255,255,255,.78); border: 1px solid rgba(255,255,255,.12); }

/* layout */
.section { padding: 0 0 64px; }
.card { background: transparent; border: 0; padding: 0; box-shadow: none; }
.app-shell { display: grid; grid-template-columns: 235px 1fr; gap: 24px; align-items: start; }
.sidebar { position: sticky; top: 82px; background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 10px; box-shadow: var(--shadow); }
.sidebar-title { padding: 10px 11px 12px; border-bottom: 1px solid var(--line); margin-bottom: 8px; }
.sidebar-title strong { display: block; font-size: 14px; font-weight: 800; }
.sidebar-title span { display: block; margin-top: 1px; color: var(--muted); font-size: 12px; font-weight: 600; }
.dashboard-nav { display: grid; gap: 4px; }
.dash-tab { width: 100%; display: flex; align-items: center; gap: 10px; padding: 10px 11px; border-radius: 12px; background: transparent; color: var(--muted); font-size: 14px; font-weight: 750; text-align: left; }
.dash-tab:hover { background: #f7f8f5; color: var(--accent); }
.dash-tab.is-active { background: var(--accent); color: #fff; }
.dash-icon { width: 24px; height: 24px; border-radius: 8px; display: inline-grid; place-items: center; background: rgba(14,87,50,.08); color: var(--accent); font-size: 13px; }
.dash-tab.is-active .dash-icon { background: rgba(255,255,255,.16); color: #fff; }
.main-panel { min-width: 0; }
.dashboard-page { display: none; }
.dashboard-page.is-active { display: block; animation: fadeUp .2s ease-out; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
.panel { background: var(--card); border: 1px solid var(--line); border-radius: 20px; padding: clamp(22px, 3.5vw, 32px); box-shadow: var(--shadow); margin-bottom: 16px; }
.panel-head { display: flex; align-items: start; justify-content: space-between; gap: 16px; margin-bottom: 20px; }
.panel-head p, .panel p, .card p { color: var(--muted); font-weight: 500; }
.panel-kicker { margin-bottom: 6px; }
.small-note { margin-top: 14px; color: var(--muted); font-size: 13px; font-weight: 500; }

/* content */
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 18px; }
.stat-card { border-top: 1px solid var(--line); padding-top: 14px; }
.stat-card strong { display: block; font-size: 30px; line-height: 1; letter-spacing: -.04em; margin-bottom: 5px; }
.stat-card span { color: var(--muted); font-size: 13px; font-weight: 650; }
.link-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; margin-top: 16px; }
.input, input, select, textarea { width: 100%; padding: 13px 14px; border: 1px solid var(--line); border-radius: 11px; background: #fbfcfb; color: var(--fg); }
.input::placeholder, input::placeholder { color: #a8ada6; }
.input:focus, input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(14,87,50,.12); background: #fff; }
.inline-actions, .invite-actions, .community-actions { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
.compact-note { padding: 14px 0 0; margin-top: 16px; border-top: 1px solid var(--line); }
.profile-card {
  position: relative; overflow: hidden; border-radius: 18px; padding: 22px;
  background:
    radial-gradient(circle at 92% 0%, rgba(204,183,132,.30), transparent 34%),
    linear-gradient(135deg, #ffffff 0%, #f4f7f2 100%);
  border: 1px solid rgba(14,87,50,.14);
}
.profile-card::after {
  content: ""; position: absolute; right: -46px; bottom: -70px; width: 170px; height: 170px; border-radius: 50%;
  background: rgba(14,87,50,.07); pointer-events: none;
}
.profile-card-grid { position: relative; z-index: 1; display: grid; grid-template-columns: 58px minmax(0,1fr); gap: 16px; align-items: start; }
.profile-icon {
  width: 58px; height: 58px; border-radius: 18px; display: grid; place-items: center;
  background: var(--accent); color: #fff; font-size: 25px; box-shadow: 0 12px 26px rgba(14,87,50,.20);
}
.profile-card h3 { margin-bottom: 6px; }
.profile-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; margin-top: 16px; }
.profile-field { border-top: 1px solid var(--line); padding-top: 11px; }
.profile-field span { display: block; color: var(--muted); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .1em; }
.profile-field strong { display: block; margin-top: 2px; font-size: 14px; word-break: break-word; }
.profile-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
.profile-card .small-note { margin-top: 12px; }
.placeholder-box { background: transparent; border: 0; border-radius: 0; padding: 0; }
.notice { margin: 16px 0; padding: 14px 16px; border-radius: 14px; background: rgba(204,183,132,.18); border: 1px solid rgba(204,183,132,.46); color: #6e581c; }
.notice p { color: #6e581c; font-weight: 700; }
.course-frame { margin-top: 16px; border: 1px solid var(--line); border-radius: 16px; overflow: hidden; background: #fff; }
.course-frame iframe { width: 100%; height: 720px; border: 0; display: block; }
.table-wrap { overflow-x: auto; border-top: 1px solid var(--line); margin-top: 6px; }
table { width: 100%; border-collapse: collapse; min-width: 620px; }
th, td { padding: 13px 10px; border-bottom: 1px solid var(--line); text-align: left; font-size: 14px; }
th { color: var(--muted); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; font-weight: 800; }
td { color: var(--fg); font-weight: 550; }
.status { display: inline-flex; border-radius: 999px; padding: 5px 9px; background: rgba(14,87,50,.08); color: var(--accent); font-size: 12px; font-weight: 800; text-transform: capitalize; }
.status-pending, .status-processing { background: rgba(204,183,132,.22); color: #6e581c; }
.status-failed, .status-cancelled { background: rgba(138,31,31,.08); color: var(--error); }


.referral-group {
  display: grid; grid-template-columns: minmax(0, 1.18fr) .82fr; gap: 18px; align-items: stretch; margin-bottom: 18px;
}
.referral-card {
  border: 1px solid var(--line); border-radius: 16px; background: #fbfcfb; padding: 18px;
}
.referral-card.feature {
  background:
    radial-gradient(circle at 96% 0%, rgba(204,183,132,.24), transparent 34%),
    #fff;
}
.referral-card h3 { margin-bottom: 7px; }
.referral-support {
  display: grid; align-content: space-between; gap: 16px;
  background:
    radial-gradient(circle at 96% 0%, rgba(204,183,132,.20), transparent 34%),
    #fff;
}
.support-details { display: grid; gap: 10px; margin-top: 14px; }
.support-detail { border-top: 1px solid var(--line); padding-top: 11px; }
.support-detail span { display: block; color: var(--muted); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; font-weight: 800; }
.support-detail strong { display: block; margin-top: 2px; font-size: 14px; word-break: break-word; }
.referral-progress {
  display: grid; align-content: space-between; gap: 14px; background: rgba(14,87,50,.055);
  border-color: rgba(14,87,50,.18);
}
.progress-top { display: flex; justify-content: space-between; gap: 12px; align-items: baseline; }
.progress-top strong { font-size: 34px; letter-spacing: -.05em; line-height: 1; color: var(--accent); }
.progress-top span { color: var(--muted); font-size: 13px; font-weight: 700; }
.progress-track { height: 8px; border-radius: 999px; overflow: hidden; background: rgba(14,87,50,.12); }
.progress-fill { height: 100%; border-radius: inherit; background: var(--accent); }
.referral-meta { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 14px; }
.referral-meta span { display: block; color: var(--muted); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; font-weight: 800; }
.referral-meta strong { display: block; margin-top: 2px; font-size: 15px; }
.referral-activity-card {
  position: relative; overflow: hidden; border-radius: 18px; padding: 22px; margin-top: 22px;
  background:
    radial-gradient(circle at 92% 0%, rgba(204,183,132,.30), transparent 34%),
    linear-gradient(135deg, #ffffff 0%, #f4f7f2 100%);
  border: 1px solid rgba(14,87,50,.14);
}
.referral-activity-card::after {
  content: ""; position: absolute; right: -46px; bottom: -70px; width: 170px; height: 170px; border-radius: 50%;
  background: rgba(14,87,50,.07); pointer-events: none;
}
.referral-activity-grid { position: relative; z-index: 1; display: grid; grid-template-columns: 58px minmax(0,1fr); gap: 16px; align-items: start; }
.referral-activity-icon {
  width: 58px; height: 58px; border-radius: 18px; display: grid; place-items: center;
  background: var(--accent); color: #fff; font-size: 25px; box-shadow: 0 12px 26px rgba(14,87,50,.20);
}
.referral-table-head { display: flex; align-items: start; justify-content: space-between; gap: 14px; margin-bottom: 14px; }
.referral-table-head h3 { margin-bottom: 6px; }
.referral-table-head p { margin-top: 0; }
.referral-activity-meta { display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; padding: 7px 11px; background: rgba(204,183,132,.18); color: #6e581c; font-size: 12px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; white-space: nowrap; }
.referral-activity-card .table-wrap { position: relative; z-index: 1; margin-top: 0; border-top: 1px solid var(--line); }
.whatsapp-card {
  position: relative; overflow: hidden; border-radius: 18px; padding: 22px;
  background:
    radial-gradient(circle at 92% 0%, rgba(204,183,132,.30), transparent 34%),
    linear-gradient(135deg, #ffffff 0%, #f4f7f2 100%);
  border: 1px solid rgba(14,87,50,.14);
}
.whatsapp-card::after {
  content: ""; position: absolute; right: -46px; bottom: -70px; width: 170px; height: 170px; border-radius: 50%;
  background: rgba(14,87,50,.07); pointer-events: none;
}
.whatsapp-grid { position: relative; z-index: 1; display: grid; grid-template-columns: 58px minmax(0,1fr); gap: 16px; align-items: start; }
.whatsapp-icon {
  width: 58px; height: 58px; border-radius: 18px; display: grid; place-items: center;
  background: var(--accent); color: #fff; font-size: 26px; box-shadow: 0 12px 26px rgba(14,87,50,.20);
}
.whatsapp-card h3 { margin-bottom: 6px; }
.whatsapp-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
.whatsapp-card .small-note { margin-top: 12px; }
.wa-meta-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; margin-top: 16px; }
.wa-meta {
  border-top: 1px solid var(--line); padding-top: 11px;
}
.wa-meta span { display: block; color: var(--muted); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; font-weight: 800; }
.wa-meta strong { display: block; margin-top: 2px; font-size: 14px; word-break: break-word; }

/* login */
.login-wrap { min-height: calc(100dvh - 128px); display: grid; place-items: center; padding: clamp(18px, 4vw, 34px) 0; }
.login-card-clean { width: min(100%, 480px); max-height: calc(100dvh - 96px); overflow-y: auto; text-align: center; background: var(--card); border: 1px solid var(--line); border-radius: 20px; padding: clamp(24px, 4vw, 34px); box-shadow: var(--shadow); }
.login-logo { height: 30px; width: auto; margin: 0 auto 22px; }
.login-card-clean h2 { margin-bottom: 10px; font-size: clamp(25px, 4vw, 34px); }
.login-card-clean p { color: var(--muted); font-weight: 500; }
.login-google-btn { margin-top: 22px; }
.login-error { margin-top: 16px; text-align: left; }
.login-divider { display: flex; align-items: center; gap: 12px; margin: 18px 0 14px; color: var(--muted); font-size: 11px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; }
.login-divider::before, .login-divider::after { content: ""; flex: 1; height: 1px; background: var(--line); }
.login-form { display: grid; gap: 9px; margin-top: 12px; text-align: left; }
.login-form label { font-size: 13px; font-weight: 800; }
.login-form .small-note { text-align: center; margin-top: 6px; }
.login-helper-box { margin-top: 12px; padding: 12px; border: 1px solid var(--line); border-radius: 14px; background: #fbfcfb; text-align: center; }
.login-helper-box .secondary-btn { width: 100%; margin-top: 10px; }
.login-helper-box .small-note { margin-top: 0; }
.state { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 18px; color: var(--accent); font-weight: 750; box-shadow: var(--shadow); }
.state.error { color: var(--error); }
.state.warn { color: #7a5a13; }



/* ===== Final dashboard auth UI: matches thank-you modal ===== */
.login-card-clean {
  width: min(100%, 660px);
  max-height: calc(100dvh - 96px);
  overflow-y: auto;
  text-align: center;
  background: var(--card);
  border: 1px solid rgba(14,87,50,.12);
  border-radius: 28px;
  padding: clamp(26px, 4vw, 42px);
  box-shadow: 0 30px 90px rgba(14,87,50,.16);
  position: relative;
}
.login-card-clean::before {
  content: "";
  position: absolute;
  inset: 12px;
  border: 1px solid rgba(204,183,132,.22);
  border-radius: 22px;
  pointer-events: none;
}
.login-card-clean > * { position: relative; z-index: 1; }
.login-card-clean h2 {
  margin: 4px 0 10px;
  font-size: clamp(26px, 4vw, 38px);
  line-height: 1.06;
  letter-spacing: -.035em;
}
.login-card-clean p { color: var(--muted); font-weight: 500; }
.auth-message { margin: 16px 0 0; text-align: center; }
.login-google-btn { width: 100%; max-width: none; margin-top: 22px; min-height: 52px; }
.login-form { display: grid; gap: 10px; margin-top: 0; text-align: left; }
.login-form label { font-size: 13px; font-weight: 850; }
.login-form input { min-height: 50px; border-radius: 13px; }
.login-form .secondary-btn,
.login-form .btn { width: 100%; min-height: 52px; margin-top: 4px; }
.login-divider { margin: 22px 0 14px; font-size: 11px; font-weight: 900; letter-spacing: .14em; }
.login-helper-box { border: 0; background: transparent; padding: 0; margin: 0; }
@media (max-width: 680px) {
  .login-card-clean { width: 100%; border-radius: 22px; padding: 26px 18px; }
  .login-card-clean::before { inset: 8px; border-radius: 18px; }
}

/* modal */
.modal-overlay { position: fixed; inset: 0; z-index: 200; display: none; align-items: center; justify-content: center; padding: 22px; background: rgba(14,14,14,.48); backdrop-filter: blur(8px); }
.modal-overlay.is-open { display: flex; }
.modal-card { width: min(100%, 720px); background: #fff; border: 1px solid var(--line); border-radius: 20px; box-shadow: 0 26px 80px rgba(14,87,50,.22); padding: clamp(22px, 4vw, 30px); position: relative; }
.modal-close { position: absolute; top: 14px; right: 14px; width: 36px; height: 36px; border-radius: 999px; background: #f7f8f5; color: var(--fg); font-size: 22px; line-height: 1; }
.invite-form { display: grid; gap: 12px; margin-top: 18px; }

}

.modal-success {

  box-shadow: 0 12px 30px rgba(14,87,50,.08);
}
.modal-success.is-visible { display: flex; }

.success-copy strong { display: block; color: var(--accent); font-size: 15px; line-height: 1.2; }
.success-copy span { display: block; margin-top: 3px; color: var(--muted); font-size: 13px; font-weight: 650; }
.iti { width: 100%; display: block; }
.iti input, .iti input[type=tel] { width: 100%; min-height: 48px; padding-top: 13px; padding-bottom: 13px; border: 1px solid var(--line); border-radius: 11px; background: #fbfcfb; }
.iti__selected-country { border-radius: 11px 0 0 11px; padding-left: 12px; background: linear-gradient(135deg, rgba(204,183,132,.22), rgba(14,87,50,.07)); }

footer { padding: 34px 0 42px; border-top: 1px solid var(--line); }

  <div class="confirm-bar">

  </footer>

  <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@25.12.5/build/js/intlTelInput.min.js"></script>
  <script>    (function() {
      const app = document.getElementById("app");
      const logoutBtn = document.getElementById("logoutBtn");
      const heroSection = document.getElementById("heroSection");
      const params = new URLSearchParams(location.search);
      const rawHash = String(location.hash || "").replace(/^#/, "");
      const hashQuery = rawHash.includes("?") ? rawHash.slice(rawHash.indexOf("?") + 1) : rawHash;
      const hashParams = new URLSearchParams(hashQuery);

      function urlParam(name) {
        return params.get(name) || hashParams.get(name) || "";
      }

      function hasUrlParam(name) {
        return params.has(name) || hashParams.has(name);
      }

      /*
        IMPORTANT:
        Replace this with your real WhatsApp group invite link.
        Example: "https://chat.whatsapp.com/AbCdEfGhIjKlMnOpQrStUv"
      */
      const WHATSAPP_GROUP_INVITE_URL = "https://chat.whatsapp.com/DEcpvUBVZjXLb1USKdeZgo";

      /*
        Optional fallback. Replace with your team WhatsApp number in international format,
        with numbers only, no plus sign or spaces. Example: "447700900000"
      */
      const WHATSAPP_SUPPORT_NUMBER = "";

      /*
        Referral invitations now go through the backend first.
        The backend saves the invite in Supabase, then optionally calls Google Apps Script.
      */
      const REFERRAL_INVITE_SCRIPT_URL = "";

      const INTL_TEL_INPUT_UTILS_URL = "https://cdn.jsdelivr.net/npm/intl-tel-input@25.12.5/build/js/utils.js";
      let invitePhoneInput = null;

  const API = {
  complete: "/api/referrals/complete-checkout",
  me: "/api/referrals/me",
  session: "/api/referrals/session",
  login: "/api/referrals/login",
  logout: "/api/referrals/logout",
  googleStart: "/auth/google/start",
  passwordLogin: "/api/referrals/password-login",
  passwordSet: "/api/referrals/password-set",
  passwordSetWithToken: "/api/referrals/password-set-with-token",
  passwordSetupToken: "/api/referrals/password-setup-token",
  passwordSetupRequest: "/api/referrals/password-setup-request",
  inviteFriend: "/api/referrals/invite-friend"
};
      const MAX_ATTEMPTS = 10;
      const RETRY_DELAY_MS = 1200;

      function $(id) {
        return document.getElementById(id);
      }

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function esc(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;"
        }[char]));
      }

      function date(value) {
        if (!value) return "—";
        const d = new Date(value);

        return Number.isFinite(d.getTime())
          ? d.toLocaleDateString(undefined, {
              year: "numeric",
              month: "short",
              day: "numeric"
            })
          : "—";
      }

      function state(message, type = "success") {
        app.innerHTML = `<div class="state ${type === "error" ? "error" : type === "warn" ? "warn" : ""}">${esc(message)}</div>`;
      }

      function googleIcon() {
        return `
          <svg class="google-mark" viewBox="0 0 48 48" aria-hidden="true">
            <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.1 6.1 29.3 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.3-.1-2.4-.4-3.5z"/>
            <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.1 6.1 29.3 4 24 4 16.3 4 9.6 8.3 6.3 14.7z"/>
            <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.3 0-9.7-3.3-11.3-7.9l-6.6 5.1C9.4 39.6 16.1 44 24 44z"/>
            <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4.1 5.6l6.2 5.2C36.9 39.3 44 34 44 24c0-1.3-.1-2.4-.4-3.5z"/>
          </svg>
        `;
      }

function sessionId() {
  return (
    params.get("checkout_session_id") ||
    params.get("session_id") ||
    params.get("checkout_configuration_id") ||
    ""
  );
}

function googleStartUrl() {
  /*
    Normal dashboard login should never depend on localStorage,
    sessionStorage, checkout cookies, or the original checkout browser.

    If a paid customer comes back later from a new browser, this sends them to:
      /auth/google/start

    server.js then checks:
      Google email === paid customer email in Supabase
  */
  return API.googleStart;
}

function googleStartUrlForCheckoutLinkingOnly() {
  /*
    Only use this on the immediate thank-you page flow, not normal login.
    This lets someone link a different Google account right after checkout,
    but it does not affect normal later logins.
  */
  const id = sessionId();
  return id ? `${API.googleStart}?checkout_session_id=${encodeURIComponent(id)}` : API.googleStart;
}

      async function json(url, options = {}) {
        const res = await fetch(url, {
          credentials: "include",
          cache: "no-store",
          headers: {
            "Accept": "application/json",
            "Content-Type": "application/json",
            ...(options.headers || {})
          },
          ...options
        });

        const text = await res.text();
        let data = {};

        try {
          data = text ? JSON.parse(text) : {};
        } catch {
          throw new Error("The server returned invalid JSON.");
        }

        if (!res.ok) {
          const error = new Error(data.error || data.message || `Request failed (${res.status}).`);
          error.status = res.status;
          error.data = data;
          throw error;
        }

        return data;
      }

      async function completeCheckout(attempt = 1) {
        const id = sessionId();
        if (!id) return null;

        const data = await json(`${API.complete}?checkout_session_id=${encodeURIComponent(id)}`);

        if (data.status === "processing" && attempt < MAX_ATTEMPTS) {
          state(`Finalising your dashboard${".".repeat((attempt % 3) + 1)}`);
          await sleep(RETRY_DELAY_MS);
          return completeCheckout(attempt + 1);
        }

        return data;
      }

     function memberEmailFromUrl() {
  return String(
    urlParam("member_email") ||
      urlParam("email") ||
      urlParam("customer_email") ||
      urlParam("customerEmail") ||
      urlParam("booking_email") ||
      urlParam("bookingEmail") ||
      ""
  ).trim().toLowerCase();
}

async function loadMe() {
  const email = memberEmailFromUrl();

  if (email) {
    return json(`${API.me}?email=${encodeURIComponent(email)}`);
  }

  return json(API.me);
}

      function normalise(data) {
        const d = data.dashboard || data.customer || data;

        const referralCode =
          d.referral_code ||
          d.referralCode ||
          "";

        const referralLink =
          d.referral_link ||
          d.referralLink ||
          (referralCode
            ? `${location.origin}/checkout.html?r=${encodeURIComponent(referralCode)}`
            : "");

        return {
          name: d.name || d.full_name || d.fullName || "Founder",
          email: d.email || "",
          phone: d.phone || d.phone_number || d.phoneNumber || "",
          company: d.company || d.business || "",

          google_connected: Boolean(d.google_connected || d.googleConnected),
          password_set: Boolean(d.password_set || d.passwordSet),
          whatsapp: d.whatsapp || {},

          referral_code: referralCode,
          referral_link: referralLink,

          max_referrals: Number(d.max_referrals ?? d.maxReferrals ?? 2),
          paid_referrals: Number(d.paid_referrals ?? d.paidReferrals ?? 0),

          referrals: Array.isArray(d.referrals) ? d.referrals : []
        };
      }

      function statusClass(status) {
        return `status status-${String(status || "paid").toLowerCase().replace(/[^a-z0-9]+/g, "-")}`;
      }

      function configuredWhatsappGroupUrl() {
        const backendUrl = String(window.__MONACO_WHATSAPP_GROUP_URL || "").trim();
        const fileUrl = String(WHATSAPP_GROUP_INVITE_URL || "").trim();

        if (backendUrl) return backendUrl;

        if (
          fileUrl &&
          !fileUrl.includes("YOUR_INVITE_CODE") &&
          fileUrl.startsWith("https://chat.whatsapp.com/")
        ) {
          return fileUrl;
        }

        return "";
      }

      function whatsappSupportUrl(d) {
        const backendUrl = String(d.whatsapp?.support_url || "").trim();
        if (backendUrl) return backendUrl;

        const number = String(WHATSAPP_SUPPORT_NUMBER || "").replace(/\D/g, "");
        if (!number) return "";

        const message = encodeURIComponent(
          `Hi, I just joined the Monaco Content Retreat. My name is ${d.name || ""} and my booking email is ${d.email || ""}.`
        );

        return `https://wa.me/${number}?text=${message}`;
      }

      function openInviteModal() {
        const modal = $("inviteModal");
        const msg = $("inviteMessage");
        const success = $("inviteSuccess");

        if (msg) {
          msg.textContent = "";
          msg.classList.remove("error");
        }

        success?.classList.remove("is-visible");
        modal?.classList.add("is-open");
        setTimeout(() => {
          initInvitePhonePicker();
          $("inviteContactValue")?.focus();
        }, 50);
      }

      function closeInviteModal() {
        $("inviteModal")?.classList.remove("is-open");
      }

      function initInvitePhonePicker() {
        const input = $("inviteWhatsappValue");
        if (!input || !window.intlTelInput || invitePhoneInput) return;

        invitePhoneInput = window.intlTelInput(input, {
          initialCountry: "gb",
          separateDialCode: true,
          nationalMode: true,
          autoPlaceholder: "aggressive",
          formatAsYouType: true,
          utilsScript: INTL_TEL_INPUT_UTILS_URL
        });
      }

      function destroyInvitePhonePicker() {
        if (!invitePhoneInput) return;
        invitePhoneInput.destroy();
        invitePhoneInput = null;
      }

      function normaliseWhatsappNumber(rawValue) {
        const raw = String(rawValue || "").trim();

        if (!raw) {
          return {
            ok: false,
            value: "",
            message: "Add one contact detail first."
          };
        }

        const selectedCountry = invitePhoneInput?.getSelectedCountryData?.() || {};
        const dialCode = String(selectedCountry.dialCode || "").replace(/\D/g, "");
        let digits = raw.replace(/[^\d+]/g, "");

        if (digits.startsWith("+")) {
          digits = `+${digits.slice(1).replace(/\D/g, "")}`;
        } else {
          let nationalDigits = digits.replace(/\D/g, "");

          if (dialCode && nationalDigits.startsWith("0")) {
            nationalDigits = nationalDigits.replace(/^0+/, "");
          }

          digits = dialCode ? `+${dialCode}${nationalDigits}` : `+${nationalDigits}`;
        }

        const e164 = `+${digits.replace(/\D/g, "")}`;

        if (!/^\+[1-9]\d{7,14}$/.test(e164)) {
          return {
            ok: false,
            value: e164,
            message: "Add a valid WhatsApp phone number."
          };
        }

        return {
          ok: true,
          value: e164,
          message: ""
        };
      }



      function normaliseInstagramHandle(value) {
        const trimmed = String(value || "").trim().replace(/\s+/g, "");
        const handle = trimmed.replace(/^@+/, "");
        return handle ? `@${handle}` : "";
      }

      function handleInstagramFocus(event) {
        const input = event.target;
        if (!String(input.value || "").trim()) {
          input.value = "@";
          requestAnimationFrame(() => input.setSelectionRange(input.value.length, input.value.length));
        }
      }

      function handleInstagramInput(event) {
        const input = event.target;
        const rawValue = String(input.value || "").replace(/\s+/g, "");
        const nextValue = rawValue ? `@${rawValue.replace(/^@+/, "")}` : "";
        if (input.value !== nextValue) {
          input.value = nextValue;
        }
      }

      function handleInstagramBlur(event) {
        const input = event.target;
        if (String(input.value || "").trim() === "@") {
          input.value = "";
        }
      }

      async function sendReferralInvitation(d) {
        const nameInput = $("inviteFriendName");
        const emailInput = $("inviteContactValue");
        const whatsappInput = $("inviteWhatsappValue");
        const instagramInput = $("inviteInstagramHandle");
        const noteInput = $("inviteNote");
        const btn = $("sendInviteBtn");
        const msg = $("inviteMessage");
        const success = $("inviteSuccess");

        const friendName = String(nameInput?.value || "").trim() || "Friend";
        const friendEmail = String(emailInput?.value || "").trim().toLowerCase();
        const rawWhatsapp = String(whatsappInput?.value || "").trim();
        const phoneResult = normaliseWhatsappNumber(rawWhatsapp);
        const friendPhone = phoneResult.value;
        const friendInstagram = normaliseInstagramHandle(instagramInput?.value || "");
        const note = String(noteInput?.value || "").trim();

        function setMessage(text, type = "success") {
          if (!msg) return;
          msg.textContent = text;
          msg.classList.toggle("error", type === "error");
        }

        if (!friendEmail) {
          setMessage("Add their email first.", "error");
          return;
        }

        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(friendEmail)) {
          setMessage("Add a valid email address.", "error");
          return;
        }

        if (!phoneResult.ok) {
          setMessage(phoneResult.message, "error");
          return;
        }

        if (!friendInstagram) {
          setMessage("Add their Instagram handle first.", "error");
          return;
        }

        if (!d.referral_link) {
          setMessage("Your referral link is not ready yet.", "error");
          return;
        }

        btn.disabled = true;
        btn.textContent = "Sending...";
        setMessage("");
        success?.classList.remove("is-visible");

        try {
          await json(API.inviteFriend, {
            method: "POST",
            body: JSON.stringify({
              referrer_email: d.email || memberEmailFromUrl(),
              friend_name: friendName,
              friend_email: friendEmail,
              friend_phone: friendPhone,
              friend_instagram: friendInstagram,
              note
            })
          });

          if (nameInput) nameInput.value = "";
          if (emailInput) emailInput.value = "";
          if (whatsappInput) whatsappInput.value = "";
          if (instagramInput) instagramInput.value = "";
          if (noteInput) noteInput.value = "";

          if (success) {
            success.innerHTML = `
              <span class="success-icon">✓</span>
              <span class="success-copy">
                <strong>Invitation sent to ${esc(friendName)}.</strong>
                <span>We’ve logged their details and included your referral link.</span>
              </span>
            `;
            success.classList.add("is-visible");
          }

          setMessage("");

          setTimeout(() => {
            closeInviteModal();
            success?.classList.remove("is-visible");
            setMessage("");
          }, 2400);
        } catch (err) {
          setMessage(err.message || "Could not send the invitation.", "error");
        } finally {
          btn.disabled = false;
          btn.textContent = "Send invitation";
        }
      }

      function whatsappCommunityHtml(d) {
        const whatsapp = d.whatsapp || {};
        const groupUrl = String(whatsapp.group_invite_url || "").trim() || configuredWhatsappGroupUrl();
        const supportUrl = whatsappSupportUrl(d);
        const primaryUrl = groupUrl || supportUrl;
        const primaryLabel = groupUrl ? "Join WhatsApp" : "Message us";
        const accessLabel = d.google_connected ? "Google connected" : "Email verified";

        if (!primaryUrl) {
          return `
            <div class="whatsapp-card">
              <div class="whatsapp-grid">
                <div class="whatsapp-icon">✓</div>
                <div>
                  <h3>WhatsApp unlocked</h3>
                  <p>Your booking email is verified. Add the real invite link to <strong>WHATSAPP_GROUP_INVITE_URL</strong>.</p>
                  <div class="wa-meta-grid">
                    <div class="wa-meta"><span>Phone on file</span><strong>${esc(whatsapp.customer_phone || d.phone || "—")}</strong></div>
                    <div class="wa-meta"><span>Access</span><strong>${esc(accessLabel)}</strong></div>
                  </div>
                </div>
              </div>
            </div>
          `;
        }

        return `
          <div class="whatsapp-card">
            <div class="whatsapp-grid">
              <div class="whatsapp-icon">☏</div>
              <div>
                <h3>Private WhatsApp group</h3>
                <p>Your access is matched to your paid booking email. Please request access, and our team will review internally.</p>
                <div class="whatsapp-actions">
                  <a class="btn" href="${esc(primaryUrl)}" target="_blank" rel="noopener">${esc(primaryLabel)}</a>
                 
                </div>
                <div class="wa-meta-grid">
                  <div class="wa-meta"><span>Phone on file</span><strong>${esc(whatsapp.customer_phone || d.phone || "your checkout phone")}</strong></div>
                  <div class="wa-meta"><span>Access</span><strong>${esc(accessLabel)}</strong></div>
                </div>

              </div>
            </div>
          </div>
        `;
      }

      function render(d) {
        heroSection?.classList.remove("hidden");

        const rows = d.referrals.length
          ? d.referrals.map((r) => `
              <tr>
                <td>${esc(r.friend_name || r.name || "Friend")}</td>
                <td>${esc(r.friend_email_masked || r.email_masked || r.email || "—")}</td>
                <td><span class="${statusClass(r.friend_payment_status || r.payment_status || "paid")}">${esc(r.friend_payment_status || r.payment_status || "paid")}</span></td>
                <td>${date(r.paid_at)}</td>
              </tr>
            `).join("")
          : `<tr><td colspan="4">No paid referrals yet.</td></tr>`;

        logoutBtn.classList.remove("hidden");

        app.innerHTML = `
          <div class="app-shell">

function bindSetupPasswordForm(options = {}) {
  const form = $("setupPasswordForm");
  const emailInput = $("setupPasswordEmail");
  const passwordInput = $("setupPasswordNew");
  const confirmInput = $("setupPasswordConfirm");
  const note = $("setupPasswordNote");

  if (!form || !emailInput || !passwordInput || !confirmInput || !note) return;

  form.addEventListener("submit", async (event) => {
    event.preventDefault();

    const password = String(passwordInput.value || "");
    const confirm = String(confirmInput.value || "");
    const email = String(emailInput.value || "").trim().toLowerCase();

    if (!email) {
      note.textContent = options.token
        ? "Enter the booking email that received this setup link."
        : "Enter the exact email from your paid booking.";
      note.style.color = "var(--error)";
      return;
    }

    if (password.length < 8) {
      note.textContent = "Password must be at least 8 characters.";
      note.style.color = "var(--error)";
      return;
    }

    if (password !== confirm) {
      note.textContent = "Passwords do not match.";
      note.style.color = "var(--error)";
      return;
    }

    const button = form.querySelector("button");
    const originalText = button?.textContent || "Set password and continue";

    if (button) {
      button.disabled = true;
      button.textContent = "Saving...";
    }

    note.textContent = "Saving your dashboard password...";
    note.style.color = "";

    try {
      const response = options.token
        ? await json(API.passwordSetWithToken, {
            method: "POST",

            /*
              Important:
              This makes email reset/setup links work independently from
              old browser cookies or old checkout sessions.
            */
            credentials: "omit",

            body: JSON.stringify({
              token: options.token,
              email,
              password
            })
          })
        : await json(API.passwordSet, {
            method: "POST",
            body: JSON.stringify({
              email,
              password
            })
          });

      if (response?.dashboard) {
        history.replaceState({}, "", "/thankyou-referral-dashboard.html");
        render(normalise(response));
        return;
      }

      const me = await loadMe();
      history.replaceState({}, "", "/thankyou-referral-dashboard.html");
      render(normalise(me));
    } catch (err) {
      note.textContent = options.token
        ? (err.message || "That setup link could not be used. Request a fresh setup email from the login page.")
        : (err.message || "Could not save your password. Try again or contact support.");
      note.style.color = "var(--error)";
    } finally {
      if (button) {
        button.disabled = false;
        button.textContent = originalText;
      }
    }
  });
}

async function requestPasswordSetupLink(email, note) {
  const clean = String(email || "").trim().toLowerCase();

  if (!clean) {
    if (note) {
      note.textContent = "Enter the email you used for your paid Monaco booking.";
      note.style.color = "var(--error)";
    }
    return;
  }

  if (note) {
    note.textContent = "Sending your setup email...";
    note.style.color = "";
  }

  try {
    const response = await json(API.passwordSetupRequest, {
      method: "POST",
      body: JSON.stringify({ email: clean })
    });

    if (note) {
      note.textContent =
        response.message ||
        "If this email belongs to a paid Monaco booking, a setup email has been sent.";
      note.style.color = "var(--accent)";
    }
  } catch (err) {
    if (note) {
      note.textContent =
        err.message ||
        "Could not send the setup email. Continue with Google if this is your Gmail, or contact support.";
      note.style.color = "var(--error)";
    }
  }
}

function bindPasswordSetupRequestForm() {
  const form = $("passwordSetupRequestForm");
  const button = $("passwordSetupRequestButton");
  const emailInput = $("passwordSetupRequestEmail") || $("passwordLoginEmail");
  const note = $("passwordSetupRequestNote") || $("passwordLoginNote");

  if (!button || !emailInput || !note) return;

  const send = async (event) => {
    if (event) event.preventDefault();

    const originalText = button.textContent || "Send setup email";
    const email = String(emailInput.value || memberEmailFromUrl() || "").trim().toLowerCase();

    button.disabled = true;
    button.textContent = "Sending...";

    await requestPasswordSetupLink(email, note);

    button.disabled = false;
    button.textContent = originalText;
  };

  if (form) {
    form.addEventListener("submit", send);
  } else {
    button.addEventListener("click", send);
  }
}

function bindPasswordLoginForm() {
  const form = $("passwordLoginForm");
  const emailInput = $("passwordLoginEmail");
  const passwordInput = $("passwordLoginPassword");
  const note = $("passwordLoginNote");

  if (!form || !emailInput || !passwordInput || !note) return;

  form.addEventListener("submit", async (event) => {
    event.preventDefault();

    const email = String(emailInput.value || "").trim().toLowerCase();
    const password = String(passwordInput.value || "");

    if (!email || !password) {
      note.textContent = "Enter the email you used at checkout and your password.";
      note.style.color = "var(--error)";
      return;
    }

    const button = form.querySelector("button");
    const originalText = button?.textContent || "Log in with username and password";

    if (button) {
      button.disabled = true;
      button.textContent = "Checking password...";
    }

    note.textContent = "Checking your booking email and password...";
    note.style.color = "";

    try {
      const response = await json(API.passwordLogin, {
        method: "POST",
        body: JSON.stringify({ email, password })
      });

      if (response?.dashboard) {
        render(normalise(response));
        return;
      }

      const me = await loadMe();
      render(normalise(me));
    } catch (err) {
      if (err?.data?.code === "PASSWORD_NOT_SET") {
        const requestNote = $("passwordSetupRequestNote") || note;
        await requestPasswordSetupLink(err.data.email || email, requestNote);

        note.textContent =
          "No password exists yet. Check your inbox for the setup email, or continue with Google.";
        note.style.color = "var(--accent)";
        return;
      }

      note.textContent = err.message || "Could not log in with that email and password.";
      note.style.color = "var(--error)";
    } finally {
      if (button) {
        button.disabled = false;
        button.textContent = originalText;
      }
    }
  });
}

async function boot() {
  try {
    const explicitPasswordToken =
      urlParam("set_password_token") ||
      urlParam("password_setup_token") ||
      urlParam("setup_token") ||
      urlParam("reset_token") ||
      "";

    const token = urlParam("token");
    const googleError = urlParam("error");

    /*
      Some reset emails use ?token=...
      Treat plain ?token= as a password setup link unless this URL is clearly
      a checkout/session return.
    */
    const plainTokenLooksLikePasswordSetup =
      token &&
      !hasUrlParam("checkout_session_id") &&
      !hasUrlParam("session_id") &&
      !hasUrlParam("checkout_configuration_id");

    const passwordSetupToken =
      explicitPasswordToken || (plainTokenLooksLikePasswordSetup ? token : "");

    /*
      Important:
      Do NOT pre-check the token here.
      Just show the password form. The backend checks the token only when the
      user submits the new password.
    */
const passwordSetupMode =
  urlParam("setup_password") === "1" ||
  urlParam("set_password") === "1" ||
  urlParam("create_password") === "1";

if (passwordSetupToken || passwordSetupMode) {
