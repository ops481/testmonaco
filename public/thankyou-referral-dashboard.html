<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Monaco Members Dashboard · Grow Acquisition</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f5f7f4;
      --card: #ffffff;
      --fg: #0e0e0e;
      --muted: #4b4b4b;
      --line: #e4e8e3;
      --accent: #0e5732;
      --accent-2: #174a32;
      --gold: #ccb784;
      --soft: #eef4ee;
      --error: #8a1f1f;
      --warn: #7a5a13;
      --shadow: 0 18px 50px rgba(14,87,50,.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: "Inter", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
      color: var(--fg);
      background:
        radial-gradient(circle at top left, rgba(204,183,132,.18), transparent 30%),
        var(--bg);
      line-height: 1.55;
      letter-spacing: .012em;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .hidden {
      display: none !important;
    }

    .confirm-bar {
      background: var(--accent);
      color: #fff;
      font-weight: 700;
    }

    .confirm-bar .container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding-top: 8px;
      padding-bottom: 8px;
      font-size: 14px;
      text-align: center;
    }

    .cb-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 0 4px rgba(204,183,132,.22);
    }

    .top {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(245,247,244,.92);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }

    .top-row {
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo {
      height: 26px;
      width: auto;
    }

    .brand-divider {
      width: 1px;
      height: 22px;
      background: var(--line);
    }

    .brand-title {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .btn,
    button {
      border: 0;
      cursor: pointer;
    }

    .btn,
    .ghost-btn,
    .secondary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      border-radius: 999px;
      font-weight: 850;
      white-space: nowrap;
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease, color .15s ease;
    }

    .btn {
      background: var(--accent);
      color: #fff;
      padding: 14px 22px;
      box-shadow: 0 6px 16px rgba(14,87,50,.18);
    }

    .btn:hover {
      background: var(--accent-2);
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(14,87,50,.24);
    }

    .secondary-btn,
    .ghost-btn {
      background: #fff;
      color: var(--accent);
      border: 1.5px solid rgba(14,87,50,.20);
      padding: 11px 16px;
      box-shadow: none;
    }

    .ghost-btn {
      font-size: 13px;
      padding: 8px 13px;
    }

    .secondary-btn:hover,
    .ghost-btn:hover {
      background: var(--accent);
      color: #fff;
    }

    button:disabled {
      opacity: .64;
      cursor: not-allowed;
      transform: none !important;
    }

    .google-btn {
      width: 100%;
      background: #fff;
      color: #1f1f1f;
      border: 1px solid #dadce0;
      box-shadow: 0 8px 20px rgba(0,0,0,.05);
    }

    .google-btn:hover {
      background: #fff;
      color: #1f1f1f;
    }

    .google-mark {
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
    }

    .hero {
      padding: 42px 0 22px;
    }

    .hero-card {
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: stretch;
      gap: 0;
      min-height: 210px;
      border-radius: 24px;
      color: #fff;
      background:
        radial-gradient(circle at 18% 12%, rgba(204,183,132,.32), transparent 30%),
        linear-gradient(135deg, #143d2a 0%, #0e5732 48%, #092417 100%);
      box-shadow: 0 22px 56px rgba(14,87,50,.18);
    }

    .hero-card::before {
      content: "";
      position: absolute;
      inset: 14px;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 18px;
      pointer-events: none;
    }

    .hero-copy {
      position: relative;
      z-index: 1;
      padding: clamp(28px, 4.5vw, 46px);
      align-self: center;
    }

    .eyebrow,
    .panel-kicker {
      color: var(--accent);
      font-size: 12px;
      letter-spacing: .18em;
      text-transform: uppercase;
      font-weight: 900;
    }

    .hero-card .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      color: #e9d8a5;
    }

    .hero-card .eyebrow::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 0 4px rgba(204,183,132,.18);
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(34px, 5vw, 58px);
      line-height: .98;
      letter-spacing: -.045em;
      font-weight: 760;
    }

    h2 {
      font-size: clamp(25px, 3vw, 34px);
      line-height: 1.08;
      letter-spacing: -.03em;
      font-weight: 760;
    }

    h3 {
      font-size: 18px;
      line-height: 1.15;
      letter-spacing: -.01em;
      font-weight: 800;
    }

    .lead {
      max-width: 560px;
      margin-top: 12px;
      color: rgba(255,255,255,.76);
      font-size: 16px;
      font-weight: 550;
    }

    .hero-accent {
      position: relative;
      z-index: 1;
      width: min(34vw, 330px);
      min-width: 260px;
      display: grid;
      place-items: center;
      padding: 28px;
      border-left: 2px dotted rgba(255,255,255,.25);
      background: #272e26;
    }

    .hub-badge {
      width: 100%;
      border-radius: 20px;
      padding: 18px;
      background: #272e26;
      color: #fff;
      box-shadow: 0 20px 46px rgba(0,0,0,.26), inset 0 1px 0 rgba(255,255,255,.08);
    }

    .hub-label {
      display: block;
      color: var(--gold);
      font-size: 11px;
      letter-spacing: .2em;
      text-transform: uppercase;
      font-weight: 900;
    }

    .hub-title {
      display: block;
      margin-top: 6px;
      font-size: 28px;
      line-height: 1;
      letter-spacing: -.04em;
      font-weight: 900;
      color: #fff;
    }

    .hub-meta {
      display: grid;
      gap: 8px;
      margin-top: 16px;
    }

    .hub-meta span,
    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 7px 11px;
      background: rgba(204,183,132,.18);
      color: #6e581c;
      font-size: 12px;
      font-weight: 850;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .hub-meta span {
      color: rgba(255,255,255,.78);
      border: 1px solid rgba(255,255,255,.12);
    }

    .hub-meta span:first-child {
      background: var(--gold);
      color: #241d0c;
      border-color: transparent;
    }

    .section {
      padding: 0 0 64px;
    }

    .state {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 24px;
      color: var(--muted);
      box-shadow: var(--shadow);
      font-weight: 650;
    }

    .state.error {
      color: var(--error);
      background: #fff7f7;
      border-color: rgba(138,31,31,.18);
    }

    .state.warn {
      color: var(--warn);
      background: rgba(204,183,132,.14);
      border-color: rgba(204,183,132,.42);
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: clamp(22px, 3.5vw, 32px);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .panel-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    .panel-head p,
    .panel p {
      color: var(--muted);
      font-weight: 550;
    }

    .small-note {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 550;
    }

    .input,
    input,
    select,
    textarea {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fbfcfb;
      color: var(--fg);
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .input::placeholder,
    input::placeholder,
    textarea::placeholder {
      color: #a8ada6;
    }

    .input:focus,
    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(14,87,50,.12);
      background: #fff;
    }

    .auth-wrap {
      max-width: 980px;
      margin: 0 auto;
    }

    .auth-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: clamp(24px, 4vw, 38px);
    }

    .auth-title {
      max-width: 720px;
      margin: 0 auto 24px;
      text-align: center;
    }

    .auth-title .panel-kicker {
      margin-bottom: 8px;
    }

    .auth-title p {
      margin-top: 12px;
      color: var(--muted);
      font-weight: 550;
    }

    .auth-google {
      max-width: 440px;
      margin: 0 auto 24px;
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 20px 0 24px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
      font-weight: 850;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .auth-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-items: stretch;
    }

    .auth-option {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 20px;
      background: #fbfcfb;
    }

    .auth-option.featured {
      background:
        radial-gradient(circle at top right, rgba(204,183,132,.28), transparent 34%),
        #fff;
      border-color: rgba(14,87,50,.18);
    }

    .auth-option h3 {
      margin-bottom: 7px;
    }

    .auth-option p {
      color: var(--muted);
      font-size: 14px;
      font-weight: 550;
      margin-bottom: 15px;
    }

    .form-grid {
      display: grid;
      gap: 10px;
    }

    .form-message {
      display: block;
      min-height: 18px;
      margin-top: 12px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 750;
    }

    .form-message.error {
      color: var(--error);
    }

    .app-shell {
      display: grid;
      grid-template-columns: 235px 1fr;
      gap: 24px;
      align-items: start;
    }

    .sidebar {
      position: sticky;
      top: 82px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 10px;
      box-shadow: var(--shadow);
    }

    .sidebar-title {
      padding: 10px 11px 12px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 8px;
    }

    .sidebar-title strong {
      display: block;
      font-size: 14px;
      font-weight: 850;
    }

    .sidebar-title span {
      display: block;
      margin-top: 1px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .dashboard-nav {
      display: grid;
      gap: 4px;
    }

    .dash-tab {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 11px;
      border-radius: 12px;
      background: transparent;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
      text-align: left;
    }

    .dash-tab:hover {
      background: #f7f8f5;
      color: var(--accent);
    }

    .dash-tab.is-active {
      background: var(--accent);
      color: #fff;
    }

    .dash-icon {
      width: 24px;
      height: 24px;
      border-radius: 8px;
      display: inline-grid;
      place-items: center;
      background: rgba(14,87,50,.08);
      color: var(--accent);
      font-size: 13px;
    }

    .dash-tab.is-active .dash-icon {
      background: rgba(255,255,255,.16);
      color: #fff;
    }

    .main-panel {
      min-width: 0;
    }

    .dashboard-page {
      display: none;
    }

    .dashboard-page.is-active {
      display: block;
      animation: fadeUp .2s ease-out;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(5px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .stat-card {
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .stat-card strong {
      display: block;
      font-size: 30px;
      line-height: 1;
      letter-spacing: -.04em;
      margin-bottom: 5px;
    }

    .stat-card span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .profile-grid,
    .referral-meta,
    .community-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 12px;
    }

    .info-box {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fbfcfb;
      padding: 16px;
    }

    .info-box span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .info-box strong {
      display: block;
      font-size: 15px;
      word-break: break-word;
    }

    .link-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-top: 16px;
    }

    .notice {
      margin: 16px 0;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(204,183,132,.18);
      border: 1px solid rgba(204,183,132,.46);
      color: #6e581c;
    }

    .notice p {
      color: #6e581c;
      font-weight: 750;
    }

    .table-wrap {
      overflow-x: auto;
      border-top: 1px solid var(--line);
      margin-top: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 620px;
    }

    th,
    td {
      padding: 13px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 14px;
    }

    th {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      font-weight: 900;
    }

    td {
      color: var(--fg);
      font-weight: 600;
    }

    .status {
      display: inline-flex;
      border-radius: 999px;
      padding: 5px 9px;
      background: rgba(14,87,50,.08);
      color: var(--accent);
      font-size: 12px;
      font-weight: 850;
      text-transform: capitalize;
    }

    .status-pending,
    .status-processing {
      background: rgba(204,183,132,.22);
      color: #6e581c;
    }

    .status-failed,
    .status-cancelled {
      background: rgba(138,31,31,.08);
      color: var(--error);
    }

    .invite-form {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .course-frame {
      margin-top: 16px;
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
    }

    .course-frame iframe {
      width: 100%;
      height: 720px;
      border: 0;
      display: block;
    }

    footer {
      padding: 34px 0 42px;
      border-top: 1px solid var(--line);
    }

    .footer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    @media (max-width: 900px) {
      .hero-card {
        grid-template-columns: 1fr;
      }

      .hero-accent {
        width: auto;
        min-width: 0;
        display: block;
        border-left: 0;
        border-top: 2px dotted rgba(255,255,255,.25);
        padding: 0 clamp(28px, 4.5vw, 46px) clamp(28px, 4.5vw, 46px);
        background: transparent;
      }

      .hub-badge {
        max-width: 360px;
      }

      .auth-grid,
      .app-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
      }

      .dashboard-nav {
        grid-template-columns: repeat(4, 1fr);
      }

      .dash-tab {
        justify-content: center;
      }

      .sidebar-title {
        display: none;
      }
    }

    @media (max-width: 680px) {
      .container,
      .top-row {
        padding-left: 18px;
        padding-right: 18px;
      }

      .brand-title,
      .brand-divider {
        display: none;
      }

      .hero {
        padding-top: 30px;
      }

      .hero-card,
      .panel,
      .auth-card {
        border-radius: 16px;
      }

      .stats-grid,
      .profile-grid,
      .referral-meta,
      .community-grid,
      .row2,
      .link-row {
        grid-template-columns: 1fr;
      }

      .dashboard-nav {
        grid-template-columns: 1fr 1fr;
      }

      .dash-tab {
        justify-content: flex-start;
      }

      .btn,
      .secondary-btn {
        width: 100%;
      }

      .footer-row {
        display: grid;
        justify-items: start;
      }

      .course-frame iframe {
        height: 620px;
      }
    }
  </style>
</head>

<body>
  <div class="confirm-bar">
    <div class="container">
      <span class="cb-dot"></span>
      Booking confirmed
    </div>
  </div>

  <header class="top">
    <div class="top-row">
      <a href="/monaco.html" class="brand">
        <img class="logo" src="ga-wordmark.png" alt="grow acquisition" />
        <span class="brand-divider"></span>
        <span class="brand-title">Monaco Content Retreat</span>
      </a>

      <button class="ghost-btn hidden" id="logoutBtn" type="button">Log out</button>
    </div>
  </header>

  <main>
    <section class="hero" id="heroSection">
      <div class="container">
        <div class="hero-card">
          <div class="hero-copy">
            <span class="eyebrow">Member dashboard</span>
            <h1>Your Monaco hub</h1>
            <p class="lead">Everything you need before Monaco: referrals, curriculum, and community access.</p>
          </div>

          <aside class="hero-accent" aria-label="Booking summary">
            <div class="hub-badge">
              <span class="hub-label">Confirmed pass</span>
              <span class="hub-title">Monaco 2026</span>
              <div class="hub-meta">
                <span>Member</span>
                <span>Email matched</span>
              </div>
            </div>
          </aside>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div id="app">
          <div class="state">Loading dashboard...</div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <div class="footer-row">
        <img src="ga-wordmark.png" alt="grow acquisition" style="height:30px;width:auto;" />
        <div>Grow Acquisition. Copyright 2026. All rights reserved.</div>
      </div>
    </div>
  </footer>

  <script>
    (function () {
      const app = document.getElementById("app");
      const logoutBtn = document.getElementById("logoutBtn");
      const params = new URLSearchParams(location.search);

      const WHATSAPP_GROUP_INVITE_URL = "https://chat.whatsapp.com/GeSjfsgJQDI8iEdoY5jLo0";

      const API = {
        complete: "/api/referrals/complete-checkout",
        me: "/api/referrals/me",
        login: "/api/referrals/login",
        logout: "/api/referrals/logout",
        googleStart: "/auth/google/start",
        passwordLogin: "/api/referrals/password-login",
        passwordSet: "/api/referrals/password-set",

      };

      function esc(value) {
        return String(value ?? "").replace(/[&<>"']/g, function (char) {
          return {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#039;"

        });
      }

        /*

        */
        return String(
          params.get("set_password_token") ||
          params.get("password_setup_token") ||
          params.get("setup_token") ||
          params.get("reset_token") ||
          params.get("token") ||

      async function api(url, options) {
        const opts = options || {};
        const headers = Object.assign(
          {
            Accept: "application/json",
            "Content-Type": "application/json"
          },
          opts.headers || {}
        );

        const res = await fetch(url, Object.assign({}, opts, {
          credentials: opts.credentials || "include",
          cache: "no-store",
          headers
        }));

        const text = await res.text();
        let data = {};

        try {
          data = text ? JSON.parse(text) : {};
        } catch (error) {
          throw new Error("The server returned invalid JSON.");
        }

        if (!res.ok) {
          const err = new Error(data.error || data.message || "Request failed.");
          err.status = res.status;
          err.data = data;
          throw err;
        }

        return data;
      }

      async function completeCheckout(attempt) {
        const id = sessionId();
        if (!id) return null;

        const currentAttempt = attempt || 1;
        const data = await api(API.complete + "?checkout_session_id=" + encodeURIComponent(id));

        if (data.status === "processing" && currentAttempt < MAX_ATTEMPTS) {
          state("Finalising your dashboard" + ".".repeat((currentAttempt % 3) + 1));
          await sleep(RETRY_DELAY_MS);
          return completeCheckout(currentAttempt + 1);
        }

        return data;
      }

      async function loadMe() {
        const email = memberEmailFromUrl();

        if (email) {
          return api(API.me + "?email=" + encodeURIComponent(email));
        }

        return api(API.me);
      }

          d.referral_link ||

        return {
          name: d.name || d.full_name || d.fullName || "Founder",
          email: d.email || "",
          phone: d.phone || d.phone_number || d.phoneNumber || "",
          company: d.company || d.business || "",
          google_connected: Boolean(d.google_connected || d.googleConnected),
          password_set: Boolean(d.password_set || d.passwordSet),
          whatsapp: d.whatsapp || {},
          referral_code: referralCode,
          referral_link: referralLink,
          max_referrals: Number(d.max_referrals ?? d.maxReferrals ?? 2),
          paid_referrals: Number(d.paid_referrals ?? d.paidReferrals ?? 0),
          referrals: Array.isArray(d.referrals) ? d.referrals : []

      }

            document.querySelectorAll(".dash-tab").forEach(function (b) {
              b.classList.toggle("is-active", b === btn);
            });

            document.querySelectorAll(".dashboard-page").forEach(function (page) {
              page.classList.toggle("is-active", page.id === "page-" + tab);
            });

        });

        if (copyBtn) {
          copyBtn.addEventListener("click", async function () {
            const input = $("referralLinkInput");
            const msg = $("copyMessage");

            try {
              await navigator.clipboard.writeText(input.value);
              msg.textContent = "Referral link copied.";
            } catch (error) {
              input.select();
              document.execCommand("copy");
              msg.textContent = "Referral link copied.";
            }
          });
        }

        const contactType = $("inviteContactType");
        const contactValue = $("inviteContactValue");

        if (contactType && contactValue) {
          contactType.addEventListener("change", function () {
            if (contactType.value === "phone") {
              contactValue.type = "tel";
              contactValue.placeholder = "+44 7399 299 167";
              contactValue.inputMode = "tel";
              contactValue.autocomplete = "tel";
            } else {
              contactValue.type = "email";
              contactValue.placeholder = "friend@example.com";
              contactValue.inputMode = "email";
              contactValue.autocomplete = "email";
            }
          });
        }

        $("openInviteBtn")?.addEventListener("click", function () {
          $("inviteFriendName")?.focus();
        });

        $("inviteInstagramHandle")?.addEventListener("input", function (event) {
          const input = event.target;
          const raw = String(input.value || "").replace(/\s+/g, "");
          input.value = raw ? "@" + raw.replace(/^@+/, "") : "";
        });

          event.preventDefault();

          const btn = $("sendInviteBtn");
          const msg = $("inviteMessage");

          const friendName = String($("inviteFriendName").value || "").trim() || "Friend";
          const contactTypeValue = String($("inviteContactType").value || "email");
          const contactValueText = String($("inviteContactValue").value || "").trim();
          const instagram = String($("inviteInstagramHandle").value || "").trim();
          const note = String($("inviteNote").value || "").trim();

          msg.textContent = "";
          msg.classList.remove("error");

          if (!contactValueText) {
            msg.textContent = "Add one contact detail first.";
            msg.classList.add("error");
            return;
          }

          btn.disabled = true;
          btn.textContent = "Sending...";

          try {
            await api(API.inviteFriend, {
              method: "POST",
              body: JSON.stringify({
                referrer_email: d.email || memberEmailFromUrl(),
                friend_name: friendName,
                friend_email: contactTypeValue === "email" ? contactValueText : "",
                friend_phone: contactTypeValue === "phone" ? contactValueText : "",
                friend_instagram: instagram,
                note: note
              })
            });

            $("inviteFriendName").value = "";
            $("inviteContactValue").value = "";
            $("inviteInstagramHandle").value = "";
            $("inviteNote").value = "";
            $("inviteContactType").value = "email";
            $("inviteContactValue").type = "email";
            $("inviteContactValue").placeholder = "friend@example.com";

            msg.textContent = "Invitation sent and saved.";
          } catch (error) {
            msg.textContent = error.message || "Could not send invitation.";
            msg.classList.add("error");
          } finally {
            btn.disabled = false;
            btn.textContent = "Send invitation";
          }
        });
      }

      async function loadDashboard() {
        state("Loading dashboard...");

        try {
          if (sessionId()) {
            await completeCheckout(1);
          }

          const me = await loadMe();
          const d = normalise(me);

          app.innerHTML = dashboardHtml(d);
          bindDashboard(d);
        } catch (error) {
          if (error.status === 401 || error.status === 403) {
            renderLogin();
            return;
          }

          renderLogin(error.message || "Please log in with your booking email.");
        }
      }

      logoutBtn.addEventListener("click", async function () {
        logoutBtn.disabled = true;

        try {
          await api(API.logout, {
            method: "POST"
          });
        } catch (error) {
          // Keep going even if logout endpoint fails.
        }

        logoutBtn.disabled = false;
        renderLogin("You have been logged out.");
      });

      async function init() {
        const token = setupTokenFromUrl();

        if (token) {
          renderPasswordSetupFromToken(token);
          return;
        }

        await loadDashboard();
      }

      init();
    })();
  </script>
</body>
</html>
