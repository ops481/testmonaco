<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Referral admin · Monaco Content Retreat</title>

  <style>
    :root {
      --bg: #f7f7f2;
      --card: #ffffff;
      --ink: #11130f;
      --muted: #697064;
      --line: #e6e8df;
      --accent: #0d5a35;
      --accent-soft: #eaf3ec;
      --warn: #8b6417;
      --warn-soft: #fbf3dd;
      --danger: #943232;
      --danger-soft: #faeaea;
      --shadow: 0 20px 60px rgba(29, 45, 34, .08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 56px;
    }

    .top {
      display: grid;
      grid-template-columns: 1fr minmax(320px, 460px);
      gap: 18px;
      align-items: end;
      margin-bottom: 18px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .13em;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(34px, 5vw, 56px);
      line-height: .95;
      letter-spacing: -.06em;
    }

    h2 {
      font-size: 22px;
      letter-spacing: -.03em;
    }

    h3 {
      font-size: 15px;
      letter-spacing: -.01em;
    }

    .subtle {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .panel,
    .key-panel {
      background: rgba(255, 255, 255, .88);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 22px;
    }

    .key-panel {
      padding: 14px;
    }

    .key-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
    }

    input {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      padding: 11px 14px;
      color: var(--ink);
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(13, 90, 53, .10);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 42px;
      border-radius: 999px;
      padding: 0 15px;
      background: var(--accent);
      color: #fff;
      font-weight: 800;
      white-space: nowrap;
    }

    .btn.secondary {
      background: #222820;
    }

    .btn.ghost {
      background: #fff;
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .btn.soft {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .btn.warn {
      background: var(--warn-soft);
      color: var(--warn);
    }

    .btn.danger {
      background: var(--danger-soft);
      color: var(--danger);
      cursor: not-allowed;
    }

    .btn:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    .message {
      margin-bottom: 12px;
    }

    .notice {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 13px 15px;
      color: var(--muted);
      background: #fff;
      font-size: 13px;
      font-weight: 700;
    }

    .notice.success {
      color: var(--accent);
      background: var(--accent-soft);
      border-color: rgba(13, 90, 53, .18);
    }

    .notice.warn {
      color: var(--warn);
      background: var(--warn-soft);
      border-color: rgba(139, 100, 23, .2);
    }

    .notice.error {
      color: var(--danger);
      background: var(--danger-soft);
      border-color: rgba(148, 50, 50, .2);
    }

    .dashboard-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      background: #fff;
    }

    .metric strong {
      display: block;
      font-size: 28px;
      line-height: 1;
      letter-spacing: -.04em;
      margin-bottom: 6px;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .metric.hot {
      background: linear-gradient(135deg, var(--accent-soft), #fff 58%);
      border-color: rgba(13, 90, 53, .18);
    }

    .controls {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 16px;
    }

    .tabs {
      display: flex;
      gap: 6px;
      padding: 5px;
      width: fit-content;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
    }

    .tab {
      border-radius: 999px;
      padding: 9px 12px;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 850;
    }

    .tab.active {
      background: var(--ink);
      color: #fff;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .group {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: #fff;
    }

    .group-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      background: #fbfbf8;
      border-bottom: 1px solid var(--line);
    }

    .group-title {
      display: grid;
      gap: 3px;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .chip,
    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }

    .chip {
      background: #fff;
      color: var(--muted);
      border: 1px solid var(--line);
    }

    .status {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .status.pending,
    .status.action-needed,
    .status.created {
      background: var(--warn-soft);
      color: var(--warn);
    }

    .status.blocked,
    .status.over-limit,
    .status.not-eligible,
    .status.error {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .status.done,
    .status.paid,
    .status.complete,
    .status.completed,
    .status.refunded-locally {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .row {
      display: grid;
      grid-template-columns: minmax(220px, 1.1fr) minmax(180px, .9fr) minmax(170px, .8fr) auto;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .row:last-child {
      border-bottom: 0;
    }

    .row.done {
      opacity: .62;
    }

    .row.blocked {
      background: var(--danger-soft);
    }

    .person {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .person strong,
    .mono {
      overflow-wrap: anywhere;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
    }

    .muted {
      color: var(--muted);
    }

    .amount {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -.03em;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      justify-content: flex-end;
    }

    .card-grid {
      display: grid;
      gap: 10px;
    }

    .mini-card {
      display: grid;
      grid-template-columns: minmax(210px, 1fr) minmax(190px, 1fr) minmax(150px, .65fr);
      gap: 12px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 15px;
      background: #fff;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 18px;
      padding: 22px;
      background: #fff;
      color: var(--muted);
      text-align: center;
      font-weight: 750;
    }

    @media (max-width: 920px) {
      .top,
      .controls,
      .row,
      .mini-card {
        grid-template-columns: 1fr;
      }

      .summary {
        grid-template-columns: 1fr 1fr;
      }

      .actions {
        justify-content: flex-start;
      }
    }

    @media (max-width: 560px) {
      .shell {
        width: min(100% - 22px, 1120px);
        padding-top: 18px;
      }

      .panel {
        padding: 16px;
        border-radius: 20px;
      }

      .key-row,
      .summary {
        grid-template-columns: 1fr;
      }

      .tabs {
        width: 100%;
        overflow-x: auto;
      }

      .tab {
        flex: 1 0 auto;
      }

      .dashboard-head {
        display: grid;
      }
    }
  </style>
</head>

<body>
  <main class="shell">
    <section class="top">
      <div>
        <p class="eyebrow">Monaco referrals</p>
        <h1>Referral admin</h1>
      </div>

      <form class="key-panel" id="keyForm">
        <div class="key-row">
          <input id="adminKey" type="password" autocomplete="current-password" placeholder="ADMIN_API_KEY" />
          <button class="btn" type="submit">Load</button>
          <button class="btn ghost" id="clearKey" type="button">Clear</button>
        </div>
      </form>
    </section>

    <div class="message" id="message"></div>

    <section class="panel" id="dashboard">
      <div class="notice">Enter your admin key to load referrals.</div>
    </section>
  </main>

  <script>
    const API_BASE = "";
    const KEY_STORAGE = "monaco_admin_key";
    const REFUND_DONE_STORAGE = "monaco_refund_done_ids";
    const FALLBACK_MAX_REFUNDS = 2;
    const WHOP_PAYMENTS_URL = "https://whop.com/dashboard/payments";

    const adminKeyInput = document.getElementById("adminKey");
    const keyForm = document.getElementById("keyForm");
    const clearKeyButton = document.getElementById("clearKey");
    const dashboard = document.getElementById("dashboard");
    const message = document.getElementById("message");

    const state = {
      data: null,
      tab: "refunds",
      search: ""
    };

    adminKeyInput.value = localStorage.getItem(KEY_STORAGE) || "";

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function asArray(value) {
      return Array.isArray(value) ? value : [];
    }

    function number(value, fallback = 0) {
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : fallback;
    }

    function lower(value) {
      return String(value || "").trim().toLowerCase();
    }

    function cleanAdminKey(value) {
      return String(value || "")
        .trim()
        .replace(/^[\s\u2022\u2023\u25E6\u2043\u2219•]+/g, "")
        .replace(/[\u200B-\u200D\uFEFF]/g, "")
        .trim();
    }

    function adminKey() {
      return cleanAdminKey(adminKeyInput.value);
    }

    function maxReferrals() {
      const fromSummary = number(state.data?.summary?.max_referrals, 0);
      const fromRoot = number(state.data?.max_referrals, 0);
      return fromSummary || fromRoot || FALLBACK_MAX_REFUNDS;
    }

    function ticketHalfLabel() {
      const cents = number(state.data?.summary?.ticket_price_cents, 260000);
      const currency = String(state.data?.summary?.currency || "EUR").toUpperCase();
      const amount = cents / 2 / 100;

      try {
        return new Intl.NumberFormat(undefined, { style: "currency", currency }).format(amount);
      } catch {
        return `${currency} ${amount.toFixed(2)}`;
      }
    }

    function formatDate(value) {
      if (!value) return "—";
      const date = new Date(value);

      return Number.isFinite(date.getTime())
        ? date.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" })
        : "—";
    }

    function statusLabel(value, fallback = "pending") {
      return String(value || fallback)
        .replace(/[_-]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function statusClass(value) {
      return `status ${lower(statusLabel(value)).replace(/[^a-z0-9]+/g, "-")}`;
    }

    function isPaid(value) {
      const status = lower(value);
      return ["paid", "complete", "completed", "success", "succeeded"].includes(status);
    }

    function paymentStatus(row) {
      return row.friend_payment_status || row.payment_status || row.status || "paid";
    }

    function rowSearchText(row) {
      return JSON.stringify(row || {}).toLowerCase();
    }

    function filtered(rows) {
      const query = state.search.trim().toLowerCase();
      if (!query) return rows;
      return rows.filter((row) => rowSearchText(row).includes(query));
    }

    function doneIds() {
      try {
        return JSON.parse(localStorage.getItem(REFUND_DONE_STORAGE) || "[]");
      } catch {
        return [];
      }
    }

    function saveDoneIds(ids) {
      localStorage.setItem(REFUND_DONE_STORAGE, JSON.stringify([...new Set(ids)]));
    }

    function refundKey(row) {
      return [
        row.id,
        row.referrerEmail,
        row.friendEmail,
        row.paymentId,
        row.checkoutId
      ].filter(Boolean).join(":") || JSON.stringify(row);
    }

    function isDone(row) {
      return doneIds().includes(refundKey(row));
    }

    function normaliseReferral(row = {}) {
      return {
        id: row.id || row.referral_id || "",
        referrerName: row.referrer_name || row.referrerName || row.referrer?.name || "",
        referrerEmail: row.referrer_email || row.referrerEmail || row.referrer_customer_email || row.referrer?.email || "",
        referrerCode: row.referrer_referral_code || row.referrerReferralCode || row.referrer_code || row.referrer?.referral_code || "",
        friendName: row.friend_name || row.friendName || row.friend?.name || row.customer_name || "",
        friendEmail: row.friend_email || row.friendEmail || row.friend_customer_email || row.friend_checkout_email || row.friend?.email || row.customer_email || "",
        status: paymentStatus(row),
        paymentId: row.friend_whop_payment_id || row.whop_payment_id || row.payment_id || "",
        checkoutId: row.created_from_checkout_session_id || row.checkout_session_id || row.session_id || "",
        sourceCode: row.created_from_referral_code || row.referral_code || row.referred_by || "",
        paidAt: row.paid_at || "",
        createdAt: row.created_at || "",
        updatedAt: row.updated_at || "",
        raw: row
      };
    }

    function normaliseCustomer(row = {}) {
      return {
        id: row.id || row.email || "",
        name: row.name || row.full_name || "",
        email: row.email || "",
        phone: row.phone || "",
        company: row.company || "",
        status: row.status || "pending",
        paidAt: row.paid_at || "",
        referralCode: row.referral_code || "",
        referralLink: row.referral_link || "",
        referredCount: number(row.referred_friend_count ?? row.paid_referrals, 0),
        referredByName: row.referred_by_name || "",
        referredByEmail: row.referred_by_email || "",
        referredByCode: row.referred_by_code || row.referred_by || "",
        checkoutId: row.checkout_session_id || "",
        paymentId: row.whop_payment_id || "",
        raw: row
      };
    }

    function normaliseSession(row = {}) {
      return {
        id: row.id || row.checkout_session_id || "",
        localId: row.local_session_id || "",
        name: row.full_name || row.name || "",
        email: row.email || "",
        paymentStatus: row.payment_status || "pending",
        status: row.status || "",
        referredBy: row.referred_by || row.referral_code || "",
        paymentId: row.whop_payment_id || "",
        purchaseUrl: row.whop_purchase_url || "",
        sourceUrl: row.source_url || "",
        createdAt: row.created_at || "",
        updatedAt: row.updated_at || "",
        raw: row
      };
    }

    function referrals() {
      return asArray(state.data?.referrals).map(normaliseReferral);
    }

    function customers() {
      return asArray(state.data?.customers).map(normaliseCustomer);
    }

    function sessions() {
      return asArray(state.data?.sessions).map(normaliseSession);
    }

    function refundRows() {
      const counts = {};
      const rows = referrals()
        .filter((row) => isPaid(row.status))
        .sort((a, b) => String(a.paidAt || a.createdAt).localeCompare(String(b.paidAt || b.createdAt)))
        .map((row) => {
          const key = lower(row.referrerEmail || row.referrerCode || "unknown");
          counts[key] = (counts[key] || 0) + 1;

          const referralNumber = counts[key];
          const eligible = referralNumber <= maxReferrals();

          return {
            ...row,
            referralNumber,
            eligible,
            done: eligible ? isDone(row) : false
          };
        });

      return rows.sort((a, b) => {
        const aRank = a.eligible && !a.done ? 0 : a.eligible && a.done ? 1 : 2;
        const bRank = b.eligible && !b.done ? 0 : b.eligible && b.done ? 1 : 2;
        if (aRank !== bRank) return aRank - bRank;
        return String(b.paidAt || b.createdAt).localeCompare(String(a.paidAt || a.createdAt));
      });
    }

    async function api(path, options = {}) {
      const key = adminKey();

      const response = await fetch(`${API_BASE}${path}`, {
        ...options,
        cache: "no-store",
        credentials: "same-origin",
        headers: {
          Accept: "application/json",
          "X-Admin-Api-Key": key,
          ...(options.body ? { "Content-Type": "application/json" } : {}),
          ...(options.headers || {})
        }
      });

      const data = await response.json().catch(() => ({}));

      if (!response.ok) {
        if (response.status === 401) {
          throw new Error("Unauthorized. Use the exact ADMIN_API_KEY from your environment. This page sends it as X-Admin-Api-Key.");
        }

        throw new Error(data.error || "Request failed.");
      }

      return data;
    }

    function showMessage(text, type = "success") {
      message.innerHTML = text
        ? `<div class="notice ${escapeHtml(type)}">${escapeHtml(text)}</div>`
        : "";
    }

    async function loadDashboard() {
      if (!adminKey()) {
        showMessage("Enter the admin API key.", "warn");
        return;
      }

      const key = adminKey();
      adminKeyInput.value = key;
      localStorage.setItem(KEY_STORAGE, key);
      showMessage("");
      dashboard.innerHTML = `<div class="notice">Loading referral data…</div>`;

      try {
        state.data = await api("/api/admin/referrals");
        render();
      } catch (error) {
        state.data = null;
        dashboard.innerHTML = `<div class="notice error">${escapeHtml(error.message || "Could not load referrals.")}</div>`;
      }
    }

    function summaryHtml() {
      const summary = state.data?.summary || {};
      const refunds = refundRows();
      const eligibleOpen = refunds.filter((row) => row.eligible && !row.done).length;

      const metrics = [
        ["Open refunds", eligibleOpen, "hot"],
        ["Paid referrals", number(summary.paid_referral_relationships, refunds.length), ""],
        ["Paid customers", number(summary.paid_customers, customers().filter((row) => isPaid(row.status)).length), ""],
        ["Pending sessions", number(summary.pending_checkout_sessions, sessions().filter((row) => !isPaid(row.paymentStatus)).length), ""]
      ];

      return `
        <div class="summary">
          ${metrics.map(([label, value, tone]) => `
            <div class="metric ${tone}">
              <strong>${escapeHtml(value)}</strong>
              <span>${escapeHtml(label)}</span>
            </div>
          `).join("")}
        </div>
      `;
    }

    function controlsHtml() {
      const tabs = [
        ["refunds", "Refunds"],
        ["relationships", "Relationships"],
        ["customers", "Customers"],
        ["sessions", "Sessions"]
      ];

      return `
        <div class="controls">
          <div class="tabs">
            ${tabs.map(([key, label]) => `
              <button class="tab ${state.tab === key ? "active" : ""}" type="button" data-tab="${key}">
                ${label}
              </button>
            `).join("")}
          </div>

          <input id="search" value="${escapeHtml(state.search)}" placeholder="Search name, email, code, payment ID…" />

          <button class="btn ghost" type="button" data-action="refresh">Refresh</button>
        </div>
      `;
    }

    function refundQueueHtml() {
      const rows = filtered(refundRows());

      if (!rows.length) {
        return `<div class="empty">No matching refund items.</div>`;
      }

      const groups = rows.reduce((acc, row) => {
        const key = lower(row.referrerEmail || row.referrerCode || "unknown");
        if (!acc[key]) {
          acc[key] = {
            key,
            name: row.referrerName || "Referrer",
            email: row.referrerEmail || "",
            code: row.referrerCode || row.sourceCode || "",
            rows: []
          };
        }
        acc[key].rows.push(row);
        return acc;
      }, {});

      return `
        <div class="list">
          ${Object.values(groups).map((group) => {
            const open = group.rows.filter((row) => row.eligible && !row.done).length;
            const over = group.rows.filter((row) => !row.eligible).length;

            return `
              <section class="group">
                <div class="group-head">
                  <div class="group-title">
                    <h3>${escapeHtml(group.name)}</h3>
                    <div class="subtle">${escapeHtml(group.email || "No email")} ${group.code ? `· ${escapeHtml(group.code)}` : ""}</div>
                  </div>
                  <div class="chip-row">
                    <span class="chip">${open} open</span>
                    <span class="chip">${group.rows.length}/${maxReferrals()} paid</span>
                    ${over ? `<span class="chip">${over} over limit</span>` : ""}
                  </div>
                </div>

                ${group.rows.map((row) => {
                  const key = refundKey(row);
                  const stateLabel = !row.eligible ? "Over limit" : row.done ? "Refunded locally" : "Action needed";

                  return `
                    <article class="row ${row.done ? "done" : ""} ${!row.eligible ? "blocked" : ""}">
                      <div class="person">
                        <strong>#${escapeHtml(row.referralNumber)} · ${escapeHtml(row.friendName || "Friend")}</strong>
                        <span class="subtle">${escapeHtml(row.friendEmail || "No email")}</span>
                      </div>

                      <div>
                        <div class="amount">${row.eligible ? escapeHtml(ticketHalfLabel()) : "No refund"}</div>
                        <div class="subtle">${formatDate(row.paidAt || row.createdAt)}</div>
                      </div>

                      <div>
                        <span class="${statusClass(stateLabel)}">${escapeHtml(stateLabel)}</span>
                        ${row.paymentId ? `<div class="mono muted">${escapeHtml(row.paymentId)}</div>` : ""}
                      </div>

                      <div class="actions">
                        <a class="btn soft" href="${WHOP_PAYMENTS_URL}" target="_blank" rel="noopener">Whop</a>
                        ${row.paymentId ? `<button class="btn ghost" type="button" data-action="copy" data-copy="${escapeHtml(row.paymentId)}">Copy ID</button>` : ""}
                        ${
                          !row.eligible
                            ? `<button class="btn danger" type="button" disabled>Blocked</button>`
                            : row.done
                              ? `<button class="btn warn" type="button" data-action="undo" data-key="${escapeHtml(key)}">Undo</button>`
                              : `<button class="btn secondary" type="button" data-action="done" data-key="${escapeHtml(key)}">Done</button>`
                        }
                      </div>
                    </article>
                  `;
                }).join("")}
              </section>
            `;
          }).join("")}
        </div>
      `;
    }

    function relationshipsHtml() {
      const rows = filtered(referrals());

      if (!rows.length) {
        return `<div class="empty">No matching referral relationships.</div>`;
      }

      const eligibility = {};
      refundRows().forEach((row) => {
        eligibility[refundKey(row)] = row;
      });

      return `
        <div class="card-grid">
          ${rows.map((row) => {
            const eligibleRow = eligibility[refundKey(row)];
            const stateLabel = !isPaid(row.status)
              ? statusLabel(row.status)
              : eligibleRow
                ? eligibleRow.eligible ? `Eligible #${eligibleRow.referralNumber}` : `Over limit #${eligibleRow.referralNumber}`
                : "Paid";

            return `
              <article class="mini-card">
                <div class="person">
                  <strong>${escapeHtml(row.referrerName || "Referrer")}</strong>
                  <span class="subtle">${escapeHtml(row.referrerEmail || "No email")}</span>
                  <span class="mono muted">${escapeHtml(row.referrerCode || "No code")}</span>
                </div>

                <div class="person">
                  <strong>→ ${escapeHtml(row.friendName || "Friend")}</strong>
                  <span class="subtle">${escapeHtml(row.friendEmail || "No email")}</span>
                  <span class="mono muted">${escapeHtml(row.paymentId || "No payment ID")}</span>
                </div>

                <div class="person">
                  <span class="${statusClass(stateLabel)}">${escapeHtml(stateLabel)}</span>
                  <span class="subtle">${formatDate(row.paidAt || row.createdAt)}</span>
                  <span class="mono muted">${escapeHtml(row.sourceCode || "No source code")}</span>
                </div>
              </article>
            `;
          }).join("")}
        </div>
      `;
    }

    function customersHtml() {
      const rows = filtered(customers());

      if (!rows.length) {
        return `<div class="empty">No matching customers.</div>`;
      }

      return `
        <div class="card-grid">
          ${rows.map((row) => `
            <article class="mini-card">
              <div class="person">
                <strong>${escapeHtml(row.name || "Customer")}</strong>
                <span class="subtle">${escapeHtml(row.email || "No email")}</span>
                ${row.company ? `<span class="subtle">${escapeHtml(row.company)}</span>` : ""}
              </div>

              <div class="person">
                <span class="${statusClass(row.status)}">${escapeHtml(statusLabel(row.status))}</span>
                <span class="subtle">${formatDate(row.paidAt)}</span>
                <span class="chip">${escapeHtml(row.referredCount)} paid referrals</span>
              </div>

              <div class="person">
                <span class="mono">${escapeHtml(row.referralCode || "No code")}</span>
                <span class="subtle">
                  ${row.referredByEmail
                    ? `Referred by ${escapeHtml(row.referredByName || row.referredByEmail)}`
                    : row.referredByCode
                      ? `Used ${escapeHtml(row.referredByCode)}`
                      : "No referrer"}
                </span>
              </div>
            </article>
          `).join("")}
        </div>
      `;
    }

    function sessionsHtml() {
      const rows = filtered(sessions());

      if (!rows.length) {
        return `<div class="empty">No matching checkout sessions.</div>`;
      }

      return `
        <div class="card-grid">
          ${rows.map((row) => `
            <article class="mini-card">
              <div class="person">
                <strong>${escapeHtml(row.name || "Customer")}</strong>
                <span class="subtle">${escapeHtml(row.email || "No email")}</span>
                <span class="mono muted">${escapeHtml(row.id || "No session ID")}</span>
              </div>

              <div class="person">
                <span class="${statusClass(row.paymentStatus)}">${escapeHtml(statusLabel(row.paymentStatus))}</span>
                <span class="subtle">${formatDate(row.createdAt)}</span>
                <span class="mono muted">${escapeHtml(row.paymentId || "No payment ID")}</span>
              </div>

              <div class="person">
                <span class="subtle">Referral code used</span>
                <span class="mono">${escapeHtml(row.referredBy || "—")}</span>
              </div>
            </article>
          `).join("")}
        </div>
      `;
    }

    function activePanelHtml() {
      if (state.tab === "relationships") return relationshipsHtml();
      if (state.tab === "customers") return customersHtml();
      if (state.tab === "sessions") return sessionsHtml();
      return refundQueueHtml();
    }

    function render() {
      if (!state.data) return;

      const loadedAt = new Date().toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit" });

      dashboard.innerHTML = `
        <div class="dashboard-head">
          <div>
            <h2>Overview</h2>
            <p class="subtle">Source: /api/admin/referrals · Loaded ${escapeHtml(loadedAt)}</p>
          </div>
          <div class="chip-row">
            <span class="chip">${maxReferrals()} refunds max</span>
            <span class="chip">${escapeHtml(ticketHalfLabel())} each</span>
          </div>
        </div>

        ${summaryHtml()}
        ${controlsHtml()}
        ${activePanelHtml()}
      `;

      const search = document.getElementById("search");
      if (search) {
        search.focus({ preventScroll: true });
        const end = search.value.length;
        search.setSelectionRange(end, end);
      }
    }

    async function copyValue(value) {
      if (!value) {
        showMessage("Nothing to copy.", "warn");
        return;
      }

      try {
        await navigator.clipboard.writeText(value);
        showMessage("Copied.");
      } catch {
        showMessage("Copy failed. Select the text manually.", "warn");
      }
    }

    keyForm.addEventListener("submit", (event) => {
      event.preventDefault();
      loadDashboard();
    });

    clearKeyButton.addEventListener("click", () => {
      localStorage.removeItem(KEY_STORAGE);
      adminKeyInput.value = "";
      state.data = null;
      showMessage("Admin key cleared.", "warn");
      dashboard.innerHTML = `<div class="notice">Enter your admin key to load referrals.</div>`;
    });

    dashboard.addEventListener("input", (event) => {
      if (event.target && event.target.id === "search") {
        state.search = event.target.value;
        render();
      }
    });

    dashboard.addEventListener("click", (event) => {
      const target = event.target.closest("[data-tab],[data-action]");
      if (!target) return;

      const tab = target.dataset.tab;
      const action = target.dataset.action;

      if (tab) {
        state.tab = tab;
        state.search = "";
        render();
        return;
      }

      if (action === "refresh") {
        loadDashboard();
        return;
      }

      if (action === "copy") {
        copyValue(target.dataset.copy || "");
        return;
      }

      if (action === "done") {
        saveDoneIds([...doneIds(), target.dataset.key]);
        showMessage("Marked done locally. Process the actual refund in Whop.");
        render();
        return;
      }

      if (action === "undo") {
        saveDoneIds(doneIds().filter((id) => id !== target.dataset.key));
        showMessage("Local mark removed.", "warn");
        render();
      }
    });

    if (adminKey()) {
      loadDashboard();
    }
  </script>
  <script>
  window.va = window.va || function () {
    (window.vaq = window.vaq || []).push(arguments);
  };
</script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
